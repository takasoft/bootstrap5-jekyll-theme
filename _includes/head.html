<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">

  <meta name="description" content="{{ site.description }}">

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

  <title>
    {% if page.title == "Home" %}
      {% if site.tagline %}
        {{ site.title }} - {{ site.tagline }}
      {% else %}
        {{ site.title }}
      {% endif %}
    {% else %}
      {{ page.title }} - {{ site.title }}
    {% endif %}
  </title>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ site.url }}{{ site.baseurl }}/public/css/toc.css">
  <link rel="stylesheet" href="{{ site.url }}{{ site.baseurl }}/public/css/main.css">
  <link rel="stylesheet" href="{{ site.url }}{{ site.baseurl }}/public/css/syntax.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" crossorigin="anonymous">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="{{ site.url }}{{ site.baseurl }}/public/apple-touch-icon.png">
  <link rel="shortcut icon" href="{{ site.url }}{{ site.baseurl }}/public/favicon.ico">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="RSS" href="/atom.xml">

  {% if page.content contains 'class="katex' %}
  <!-- KaTeX CSS for math rendered at build time by kramdown's katex engine.
       Auto-detected: the page's rendered HTML (page.content) is already
       built when this include runs, so we just check whether kramdown
       emitted any KaTeX markup and pull in the CSS only when it did.
       WOFF2 fonts download on-demand only when math glyphs are painted. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <style>
    /* Long display equations would otherwise overflow the layout on narrow
       viewports (mobile) and push the whole page wider. Constrain to the
       container and allow horizontal scroll within the equation itself. */
    .katex-display {
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0.25em 0;
    }
  </style>
  {% endif %}
</head>
