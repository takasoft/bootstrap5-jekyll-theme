<!--Footer-->
<footer>

  <p class="simple-footer" align="center">&copy; {{ site.time | date: '%Y' }} <a class="simple-footer" href="{{ site.baseurl }}/">{{ site.title }}</a></p>

  <!-- Bootstrap 5 JS bundle (includes Popper; no jQuery dependency) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

  <!-- Mermaid: lazy-load only on pages that have ```mermaid blocks. -->
  <script type="module">
    if (document.querySelector('.language-mermaid')) {
      const { default: mermaid } = await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
      document.querySelectorAll('.language-mermaid').forEach(el => {
        const code = el.textContent;
        const target = el.closest('pre') || el;
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code;
        target.replaceWith(div);
      });
      mermaid.initialize({ startOnLoad: false, theme: 'default' });
      await mermaid.run();
    }
  </script>

  {% if site.cloudflare_analytics_token %}
  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
          data-cf-beacon='{"token": "{{ site.cloudflare_analytics_token }}"}'></script>
  <!-- End Cloudflare Web Analytics -->
  {% endif %}

  {% if site.google_analytics %}
  <!-- Google Analytics 4 (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {% endif %}

</footer>
